<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Order - Satyabati Hindu Hotel</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #ffffff;
}

/* Header */
.header {
  background: #5A5A5A;
  color: white;
  text-align: center;
  padding: 16px;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 15px;
  padding-bottom: 100px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.section {
  background: white;
  padding: 14px;
  margin-top: 12px;
  border-radius: 14px;
  border: 1px solid #eee;
}

.qty-box {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.qty-btn {
  background: #5A5A5A;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
}

/* Add More */
.add-more {
  text-align: center;
  padding: 12px;
  background: #f2f2f2;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

/* Category buttons */
.cat-btns, .subcat-btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.cat-btns button, .subcat-btns button {
  padding: 6px 10px;
  border: none;
  border-radius: 20px;
  background: #eee;
}

.active {
  background: #5A5A5A !important;
  color: #fff;
}

/* Menu item */
.menu-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 0;
  border-bottom:1px solid #eee;
}

.btns {
  display:flex;
  gap:5px;
}

.add-btn {
  background:#FFC107;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  min-width:60px;
}

.remove-btn {
  background:#5A5A5A;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  min-width:60px;
}

/* Bottom */
.total-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  border-top: 1px solid #ccc;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.total {
  font-size: 22px;
  font-weight: bold;
}

.btn {
  background: #FFC107;
  border: none;
  padding: 12px 20px;
  font-weight: bold;
  border-radius: 10px;
  margin-right: 10px; /* shift left */
}

/* Popup */
#popup {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
}

.popup-box {
  background:white;
  margin:20% auto;
  padding:15px;
  width:90%;
  max-width:350px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="header">Satyabati Hindu Hotel</div>

<div class="container">

<div class="section">
<input id="name" placeholder="Enter your Full Name">
<input id="phone" type="tel" placeholder="Enter Phone Number">
<input id="village" placeholder="Enter Village Name">
<input id="ps" placeholder="Enter Police Station">
</div>

<div class="section">
<b id="itemName"></b>

<div class="qty-box">
<div>Quantity</div>
<div>
<button class="qty-btn" onclick="changeQty(-1)">-</button>
<span id="qty">1</span>
<button class="qty-btn" onclick="changeQty(1)">+</button>
</div>
</div>
</div>

<!-- Add-ons -->
<div class="section">
<b>Add-ons</b>

<div class="qty-box">
<div>Extra Half Rice (₹6)</div>
<div>
<button class="qty-btn" onclick="half=Math.max(0,half-1);update()">-</button>
<span id="halfQty">0</span>
<button class="qty-btn" onclick="half++;update()">+</button>
</div>
</div>

<div class="qty-box">
<div>Extra Full Rice (₹11)</div>
<div>
<button class="qty-btn" onclick="full=Math.max(0,full-1);update()">-</button>
<span id="fullQty">0</span>
<button class="qty-btn" onclick="full++;update()">+</button>
</div>
</div>

<div class="qty-box">
<div>Disposable Plate (₹2)</div>
<div>
<button class="qty-btn" onclick="plate=Math.max(0,plate-1);update()">-</button>
<span id="plateQty">0</span>
<button class="qty-btn" onclick="plate++;update()">+</button>
</div>
</div>

</div>

<!-- More Items -->
<div class="section">
<div class="add-more" onclick="toggleMenu()">+ Add More Items</div>

<div class="cat-btns" id="catBtns"></div>
<div class="subcat-btns" id="subBtns"></div>

<div id="menuBox" style="display:none;margin-top:10px;"></div>
</div>

</div>

<!-- Bottom -->
<div class="total-bar">
<div class="total">₹ <span id="total">0</span></div>
<button class="btn" onclick="confirmOrder()">Proceed</button>
</div>

<!-- Popup -->
<div id="popup">
<div class="popup-box">
<h3>Confirm Order</h3>
<div id="summary"></div><br>
<button onclick="closePopup()">Edit</button>
<button onclick="sendWhatsApp()" style="background:#FFC107;border:none;">Confirm</button>
</div>
</div>

<script>
const item = new URLSearchParams(location.search).get("item") || "Item";
const price = parseInt(new URLSearchParams(location.search).get("price")) || 0;

document.getElementById("itemName").innerText = item;

let cart=[{name:item,price:price,qty:1}];
let half=0,full=0,plate=0;

let allItems=[];
let currentCat="All";
let currentSub="All";

function changeQty(v){
cart[0].qty=Math.max(1,cart[0].qty+v);
document.getElementById("qty").innerText=cart[0].qty;
update();
}

function update(){
let total=0;
cart.forEach(i=>total+=i.price*i.qty);
total+=half*6+full*11+plate*2;
document.getElementById("total").innerText=total;
}
update();

/* LOAD ONLY 2ND SHEET */
function toggleMenu(){
let box=document.getElementById("menuBox");

if(box.style.display==="none"){
box.style.display="block";

fetch("https://docs.google.com/spreadsheets/d/1ha14_n8IdltiVwrMFYSC5e8l5fnMkJUQkxHqd1KzpcQ/gviz/tq?tqx=out:json&sheet=More%20Items")
.then(r=>r.text())
.then(d=>{
const j=JSON.parse(d.substr(47).slice(0,-2));

allItems=[];

j.table.rows.forEach(r=>{
let cat=r.c[2]?.v;
let sub=r.c[3]?.v;
let name=r.c[4]?.v;
let price=r.c[5]?.v;
let show=r.c[11]?.v;

if(name && (show==="Yes"||show==="yes")){
allItems.push({cat,sub,name,price});
}
});

createCats();
displayItems();
});
}else{
box.style.display="none";
}
}

/* CATEGORY */
function createCats(){
let cats=["All",...new Set(allItems.map(i=>i.cat))];

let html="";
cats.forEach(c=>{
html+=`<button onclick="filterCat('${c}')" class="${c===currentCat?'active':''}">${c}</button>`;
});
document.getElementById("catBtns").innerHTML=html;

let subs=["All",...new Set(allItems.filter(i=>currentCat==="All"||i.cat===currentCat).map(i=>i.sub))];

let html2="";
subs.forEach(s=>{
html2+=`<button onclick="filterSub('${s}')" class="${s===currentSub?'active':''}">${s}</button>`;
});
document.getElementById("subBtns").innerHTML=html2;
}

function filterCat(c){
currentCat=c;
currentSub="All";
createCats();
displayItems();
}

function filterSub(s){
currentSub=s;
createCats();
displayItems();
}

/* DISPLAY */
function displayItems(){
let list=allItems.filter(i=>
(currentCat==="All"||i.cat===currentCat) &&
(currentSub==="All"||i.sub===currentSub)
);

let html="";
list.forEach(i=>{
let exists=cart.find(x=>x.name===i.name);

html+=`
<div class="menu-item">
<div>${i.name} ₹${i.price}</div>
<div class="btns">
<button class="add-btn">${exists?'Added':'Add'}</button>
<button class="remove-btn">${exists?'Remove':'Removed'}</button>
</div>
</div>`;
});

document.getElementById("menuBox").innerHTML=html;
}
</script>

</body>
</html>
