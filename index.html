<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family:Arial;margin:0;background:#f9f9f9;color:#333;}

.header {
  background:#FFC107;
  text-align:center;
  padding:12px;
  font-weight:bold;
  position:sticky;
  top:0;
  z-index:1000;
}

.container {
  padding:10px;
  padding-bottom:180px;
}

input {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.section {
  background:#fff;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #eee;
}

.qty-box {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:8px;
}

.qty-btn {
  background:#5A5A5A;
  color:#fff;
  border:none;
  width:32px;
  height:32px;
  border-radius:6px;
}

.item-count {
  margin:0 10px;
  font-weight:bold;
}

.add-more {
  text-align:center;
  padding:12px;
  border:2px dashed #FFC107;
  border-radius:10px;
  font-weight:bold;
  margin:10px 0;
  background:#fff;
}

.total-bar {
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  border-top:2px solid #FFC107;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.total {
  font-size:20px;
  font-weight:bold;
}

/* ✅ BIGGER PROCEED BUTTON */
.btn {
  background:#FFC107;
  border:none;
  padding:14px 28px;
  border-radius:10px;
  font-weight:bold;
  font-size:16px;
  margin-right:30px;
}

#popup {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
}

.popup-box {
  background:#fff;
  margin:20% auto;
  padding:15px;
  width:90%;
  max-width:350px;
  border-radius:10px;
}

.popup-btn {
  width:48%;
  padding:10px;
  border:none;
  border-radius:6px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">Satyabati Hindu Hotel</div>

<div class="container">

<div class="section">
<input id="name" placeholder="Enter your Full Name">

<!-- ✅ CHANGED TEXT -->
<input id="phone" type="tel" inputmode="numeric" pattern="[0-9]*" placeholder="Enter Phone Number">

<input id="village" placeholder="Enter Village Name">
<input id="ps" placeholder="Enter Police Station">
</div>

<div class="section">
<b id="itemName"></b>

<div class="qty-box">
<div>Quantity</div>
<div>
<button class="qty-btn" onclick="changeQty(-1)">-</button>
<span id="qty" class="item-count">1</span>
<button class="qty-btn" onclick="changeQty(1)">+</button>
</div>
</div>
</div>

<div class="section">
<b>Add-ons</b>

<div class="qty-box">
<div>Half Rice ₹6</div>
<div>
<button class="qty-btn" onclick="half=Math.max(0,half-1);updateTotal()">-</button>
<span id="halfQty" class="item-count">0</span>
<button class="qty-btn" onclick="half++;updateTotal()">+</button>
</div>
</div>

<div class="qty-box">
<div>Full Rice ₹11</div>
<div>
<button class="qty-btn" onclick="full=Math.max(0,full-1);updateTotal()">-</button>
<span id="fullQty" class="item-count">0</span>
<button class="qty-btn" onclick="full++;updateTotal()">+</button>
</div>
</div>

<div class="qty-box">
<div>Plate ₹2</div>
<div>
<button class="qty-btn" onclick="plate=Math.max(0,plate-1);updateTotal()">-</button>
<span id="plateQty" class="item-count">0</span>
<button class="qty-btn" onclick="plate++;updateTotal()">+</button>
</div>
</div>

</div>

<div id="menuBox"></div>
<div class="add-more" onclick="loadMore()" id="loadBtn">+ Add More Items</div>

</div>

<div class="total-bar">
<div class="total">₹ <span id="total">0</span></div>
<button class="btn" onclick="confirmOrder()">Proceed</button>
</div>

<div id="popup">
<div class="popup-box">
<h3>Confirm Order</h3>
<div id="summary"></div><br>

<div style="display:flex;justify-content:space-between;">
<button class="popup-btn" style="background:#eee" onclick="closePopup()">Edit</button>
<button class="popup-btn" style="background:#FFC107" onclick="sendOrder()">Confirm</button>
</div>

</div>
</div>

<script>

const item = new URLSearchParams(location.search).get("item") || "Meal";
const price = parseInt(new URLSearchParams(location.search).get("price")) || 0;

document.getElementById("itemName").innerText = item;

let cart = { main:{name:item,price:price,qty:1}, more:{} };

let half=0,full=0,plate=0;
let moreData=[],loaded=false;

function changeQty(v){
cart.main.qty=Math.max(1,cart.main.qty+v);
document.getElementById("qty").innerText=cart.main.qty;
updateTotal();
}

function updateTotal(){
let total=cart.main.price*cart.main.qty;

Object.values(cart.more).forEach(i=>{
total+=i.price*i.qty;
});

total+=half*6+full*11+plate*2;

document.getElementById("total").innerText=total;
document.getElementById("halfQty").innerText=half;
document.getElementById("fullQty").innerText=full;
document.getElementById("plateQty").innerText=plate;
}

function loadMore(){
if(loaded) return;

let btn=document.getElementById("loadBtn");
btn.innerText="Loading...";

fetch("https://docs.google.com/spreadsheets/d/1qKc-2U5UGNKXbnvXYmBAlou36Uo9avtXe2Y36_PhRVY/gviz/tq?tqx=out:json&sheet=More%20Items")
.then(r=>r.text())
.then(d=>{
const j=JSON.parse(d.substr(47).slice(0,-2));

moreData=[];

j.table.rows.forEach(r=>{
let name=r.c[4]?.v;
let price=r.c[5]?.v;
let show=r.c[11]?.v;

if(name && show && show.toLowerCase()=="yes"){
moreData.push({
id:name,
name:name,
price:price
});
}
});

renderMore();
loaded=true;
btn.style.display="none";
});
}

function renderMore(){
let html="";

moreData.forEach(i=>{
let q=cart.more[i.id]?.qty||0;

html+=`
<div class="section">
<div><b>${i.name}</b> ₹${i.price}</div>

<div class="qty-box">
<div>Quantity</div>
<div>
<button class="qty-btn" onclick="updateMore('${i.id}',-1)">-</button>
<span class="item-count">${q}</span>
<button class="qty-btn" onclick="updateMore('${i.id}',1)">+</button>
</div>
</div>

</div>`;
});

document.getElementById("menuBox").innerHTML=html;
}

function updateMore(id,val){
let item=moreData.find(x=>x.id==id);

if(!cart.more[id] && val>0){
cart.more[id]={name:item.name,price:item.price,qty:1};
}
else if(cart.more[id]){
cart.more[id].qty+=val;
if(cart.more[id].qty<=0) delete cart.more[id];
}

renderMore();
updateTotal();
}

function confirmOrder(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let village=document.getElementById("village").value.trim();
let ps=document.getElementById("ps").value.trim();

if(!/^\d{10}$/.test(phone)){
alert("Wrong Phone Number");
return;
}

if(!name||!village||!ps){
alert("Fill all details");
return;
}

let items=`${cart.main.name} x${cart.main.qty}<br>`;

Object.values(cart.more).forEach(i=>{
items+=`${i.name} x${i.qty}<br>`;
});

if(half>0) items+=`Half Rice x${half}<br>`;
if(full>0) items+=`Full Rice x${full}<br>`;
if(plate>0) items+=`Plate x${plate}<br>`;

let total=document.getElementById("total").innerText;

document.getElementById("summary").innerHTML=
`<b>${name}</b><br><br>${items}<br><b>Total ₹${total}</b>`;

document.getElementById("popup").style.display="block";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function sendOrder(){

let total=document.getElementById("total").innerText;

let msg=`Satyabati Hindu Hotel
New Order

${document.getElementById("name").value}
Phone - ${document.getElementById("phone").value}
Village - ${document.getElementById("village").value}
P.S - ${document.getElementById("ps").value}

Order:
${cart.main.name} x${cart.main.qty}
`;

Object.values(cart.more).forEach(i=>{
msg+=`${i.name} x${i.qty}\n`;
});

if(half>0) msg+=`Half Rice x${half}\n`;
if(full>0) msg+=`Full Rice x${full}\n`;
if(plate>0) msg+=`Plate x${plate}\n`;

msg+=`
Total - ₹${total}

Pay here:
https://tinyurl.com/satyabati-pay

Please Pay ₹${total} and Send Payment Screenshot

Thank You`;

window.location.href=`whatsapp://send?phone=919836697502&text=${encodeURIComponent(msg)}`;

setTimeout(()=>{
window.open(`https://wa.me/919836697502?text=${encodeURIComponent(msg)}`,"_blank");
},800);

}

updateTotal();

</script>

</body>
</html>
