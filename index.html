<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Order - Satyabati Hindu Hotel</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #ffffff;
}

/* Header */
.header {
  background: #5A5A5A;
  color: white;
  text-align: center;
  padding: 16px;
  font-size: 20px;
  font-weight: bold;
}

/* Container */
.container {
  padding: 15px;
  padding-bottom: 100px; /* 🔥 prevent overlap */
}

/* Inputs */
input {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* Card */
.section {
  background: white;
  padding: 14px;
  margin-top: 12px;
  border-radius: 14px;
  border: 1px solid #eee;
}

/* Quantity */
.qty-box {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.qty-btn {
  background: #5A5A5A;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
}

/* Add More Button */
.add-more {
  text-align: center;
  padding: 14px;
  background: #f2f2f2;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

/* Menu Item */
.menu-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid #eee;
}

/* Add button */
.add-btn {
  background:#ddd;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
}

/* Remove button */
.remove-btn {
  background:#ff4d4d;
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
}

/* Bottom bar */
.total-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  border-top: 1px solid #ccc;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.total {
  font-size: 22px;
  font-weight: bold;
}

.btn {
  background: #FFC107;
  border: none;
  padding: 12px 16px;
  font-weight: bold;
  border-radius: 10px;
}

/* Popup */
#popup {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
}

.popup-box {
  background:white;
  margin:20% auto;
  padding:15px;
  width:90%;
  max-width:350px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="header">Satyabati Hindu Hotel</div>

<div class="container">

<!-- Customer -->
<div class="section">
<input id="name" placeholder="Enter your Full Name">
<input id="phone" type="tel" placeholder="Enter Phone Number">
<input id="village" placeholder="Enter Village Name">
<input id="ps" placeholder="Enter Police Station">
</div>

<!-- Main Item -->
<div class="section">
<b id="itemName"></b>

<div class="qty-box">
<div>Quantity</div>
<div>
<button class="qty-btn" onclick="changeQty(-1)">-</button>
<span id="qty">1</span>
<button class="qty-btn" onclick="changeQty(1)">+</button>
</div>
</div>
</div>

<!-- Add-ons -->
<div class="section">
<b>Add-ons</b>

<div class="qty-box">
<div>Extra Half Rice (₹6)</div>
<div>
<button class="qty-btn" onclick="half=Math.max(0,half-1);update()">-</button>
<span id="halfQty">0</span>
<button class="qty-btn" onclick="half++;update()">+</button>
</div>
</div>

<div class="qty-box">
<div>Extra Full Rice (₹11)</div>
<div>
<button class="qty-btn" onclick="full=Math.max(0,full-1);update()">-</button>
<span id="fullQty">0</span>
<button class="qty-btn" onclick="full++;update()">+</button>
</div>
</div>

<div class="qty-box">
<div>Disposable Plate (₹2)</div>
<div>
<button class="qty-btn" onclick="plate=Math.max(0,plate-1);update()">-</button>
<span id="plateQty">0</span>
<button class="qty-btn" onclick="plate++;update()">+</button>
</div>
</div>

</div>

<!-- More Items -->
<div class="section">
<div class="add-more" onclick="toggleMenu()">+ Add More Items</div>
<div id="menuBox" style="display:none;margin-top:10px;"></div>
</div>

</div>

<!-- Bottom -->
<div class="total-bar">
<div class="total">₹ <span id="total">0</span></div>
<button class="btn" onclick="confirmOrder()">Proceed</button>
</div>

<!-- Popup -->
<div id="popup">
<div class="popup-box">
<h3>Confirm Order</h3>
<div id="summary"></div>
<br>
<button onclick="closePopup()">Edit</button>
<button onclick="sendWhatsApp()" style="background:#FFC107;border:none;">Confirm</button>
</div>
</div>

<script>
const item = new URLSearchParams(location.search).get("item") || "Item";
const price = parseInt(new URLSearchParams(location.search).get("price")) || 0;

document.getElementById("itemName").innerText = item;

let cart=[{name:item,price:price,qty:1}];
let half=0,full=0,plate=0;

function changeQty(v){
cart[0].qty=Math.max(1,cart[0].qty+v);
document.getElementById("qty").innerText=cart[0].qty;
update();
}

function update(){
let total=0;
cart.forEach(i=>total+=i.price*i.qty);
total+=half*6+full*11+plate*2;

document.getElementById("total").innerText=total;
document.getElementById("halfQty").innerText=half;
document.getElementById("fullQty").innerText=full;
document.getElementById("plateQty").innerText=plate;
}
update();

/* LOAD ONLY MORE ITEMS SHEET */
function toggleMenu(){
let box=document.getElementById("menuBox");

if(box.style.display==="none"){
box.style.display="block";

fetch("https://docs.google.com/spreadsheets/d/1ha14_n8IdltiVwrMFYSC5e8l5fnMkJUQkxHqd1KzpcQ/gviz/tq?tqx=out:json&sheet=More%20Items")
.then(r=>r.text())
.then(d=>{
const j=JSON.parse(d.substr(47).slice(0,-2));

let html="";
j.table.rows.forEach(r=>{
let name=r.c[4]?.v;
let price=r.c[5]?.v;
let show=r.c[11]?.v;

if(name && (show==="Yes"||show==="yes")){
let exists = cart.find(i=>i.name===name);

html+=`
<div class="menu-item">
<div>${name} ₹${price}</div>
<button class="${exists?'remove-btn':'add-btn'}"
onclick="toggleItem('${name}',${price})">
${exists?'Remove':'Add'}
</button>
</div>`;
}
});

box.innerHTML=html;
});
}else{
box.style.display="none";
}
}

/* TOGGLE ADD / REMOVE */
function toggleItem(name,price){
let index=cart.findIndex(i=>i.name===name);

if(index>-1){
cart.splice(index,1);
}else{
cart.push({name,price,qty:1});
}

toggleMenu();
toggleMenu();
update();
}

/* POPUP */
function confirmOrder(){
let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let village=document.getElementById("village").value.trim();
let ps=document.getElementById("ps").value.trim();

if(!name||!phone||!village||!ps){alert("Fill all details");return;}
if(phone.length!=10){alert("Invalid phone");return;}

let total=document.getElementById("total").innerText;

window.data={name,phone,village,ps,total};

let items="";
cart.forEach(i=>{if(i.qty>0){items+=`${i.name} (${i.qty})<br>`;}});

if(half>0) items+=`Half Rice (${half})<br>`;
if(full>0) items+=`Full Rice (${full})<br>`;
if(plate>0) items+=`Plate (${plate})<br>`;

document.getElementById("summary").innerHTML=
`<b>${name}</b><br><br>${items}<br><b>Total ₹${total}</b>`;

document.getElementById("popup").style.display="block";
}

function closePopup(){document.getElementById("popup").style.display="none";}

function sendWhatsApp(){
let d=window.data;
let items="";

cart.forEach(i=>{if(i.qty>0){items+=`- ${i.name} x${i.qty}\n`;}});

if(half>0) items+=`- Half Rice x${half}\n`;
if(full>0) items+=`- Full Rice x${full}\n`;
if(plate>0) items+=`- Plate x${plate}\n`;

let msg=`📍 Satyabati Hindu Hotel

👤 ${d.name}
📞 ${d.phone}
🏡 ${d.village}
🚓 ${d.ps}

🛒 Order:
${items}

💰 Total ₹${d.total}

👉 Please Pay ₹${d.total}`;

window.open(`https://wa.me/919836697502?text=${encodeURIComponent(msg)}`);
closePopup();
}
</script>

</body>
</html>
