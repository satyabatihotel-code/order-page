<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family:Arial;margin:0;background:#fff;}

.header {
  background:#FFC107;
  color:#000;
  text-align:center;
  padding:16px;
  font-weight:bold;
}

.container {
  padding:15px;
  padding-bottom:180px; /* FIXED overlap */
}

input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.section {
  background:#fff;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #eee;
}

.qty-box {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:10px;
}

.qty-btn {
  background:#5A5A5A;
  color:#fff;
  border:none;
  padding:6px 12px;
  border-radius:6px;
}

/* Add More */
.add-more {
  text-align:center;
  padding:12px;
  background:#f2f2f2;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

/* Filters */
.cat-btns,.sub-btns {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:8px;
}

.cat-btns button,.sub-btns button {
  padding:6px 10px;
  border:none;
  border-radius:20px;
  background:#eee;
}

.active {background:#5A5A5A;color:#fff;}

/* Menu */
.menu-item {
  padding:10px 0;
  border-bottom:1px solid #eee;
}

.menu-top {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* Bottom */
.total-bar {
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  border-top:1px solid #ccc;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.total {
  font-size:22px;
  font-weight:bold;
}

.btn {
  background:#FFC107;
  border:none;
  padding:12px 20px;
  border-radius:10px;
  font-weight:bold;
  margin-right:60px;
}

/* Popup */
#popup {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
}

.popup-box {
  background:#fff;
  margin:20% auto;
  padding:15px;
  width:90%;
  max-width:350px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">Satyabati Hindu Hotel</div>

<div class="container">

<!-- FORM -->
<div class="section">
<input id="name" placeholder="Enter your Full Name">
<input id="phone" type="tel" placeholder="Enter WhatsApp Number">
<input id="email" placeholder="Enter your Email">
<input id="village" placeholder="Enter Village Name">
<input id="ps" placeholder="Enter Police Station">
</div>

<!-- MAIN ITEM -->
<div class="section">
<b id="itemName"></b>

<div class="qty-box">
<div>Quantity</div>
<div>
<button class="qty-btn" onclick="changeQty(-1)">-</button>
<span id="qty">1</span>
<button class="qty-btn" onclick="changeQty(1)">+</button>
</div>
</div>
</div>

<!-- ADDONS -->
<div class="section">
<b>Add-ons</b>

<div class="qty-box">
<div>Half Rice ₹6</div>
<div>
<button class="qty-btn" onclick="half=Math.max(0,half-1);update()">-</button>
<span id="halfQty">0</span>
<button class="qty-btn" onclick="half++;update()">+</button>
</div>
</div>

<div class="qty-box">
<div>Full Rice ₹11</div>
<div>
<button class="qty-btn" onclick="full=Math.max(0,full-1);update()">-</button>
<span id="fullQty">0</span>
<button class="qty-btn" onclick="full++;update()">+</button>
</div>
</div>

<div class="qty-box">
<div>Plate ₹2</div>
<div>
<button class="qty-btn" onclick="plate=Math.max(0,plate-1);update()">-</button>
<span id="plateQty">0</span>
<button class="qty-btn" onclick="plate++;update()">+</button>
</div>
</div>
</div>

<!-- MORE ITEMS -->
<div class="section">
<div class="add-more" onclick="toggleMenu()">+ Add More Items</div>

<div class="cat-btns" id="catBtns"></div>
<div class="sub-btns" id="subBtns"></div>

<div id="menuBox" style="display:none;"></div>
</div>

</div>

<!-- TOTAL -->
<div class="total-bar">
<div class="total">₹ <span id="total">0</span></div>
<button class="btn" onclick="confirmOrder()">Proceed</button>
</div>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h3>Confirm Order</h3>
<div id="summary"></div><br>
<button onclick="closePopup()">Edit</button>
<button style="background:#FFC107;border:none;" onclick="sendOrder()">Confirm</button>
</div>
</div>

<script>
const item = new URLSearchParams(location.search).get("item") || "Item";
const price = parseInt(new URLSearchParams(location.search).get("price")) || 0;

document.getElementById("itemName").innerText = item;

let cart=[{name:item,price:price,qty:1}];
let half=0,full=0,plate=0;

let allItems=[],currentCat="All",currentSub="All";

/* MAIN QTY */
function changeQty(v){
cart[0].qty=Math.max(1,cart[0].qty+v);
document.getElementById("qty").innerText=cart[0].qty;
update();
}

/* TOTAL */
function update(){
let total=0;
cart.forEach(i=>total+=i.price*i.qty);
total+=half*6+full*11+plate*2;
document.getElementById("total").innerText=total;

document.getElementById("halfQty").innerText=half;
document.getElementById("fullQty").innerText=full;
document.getElementById("plateQty").innerText=plate;
}
update();

/* LOAD SHEET */
function toggleMenu(){
let box=document.getElementById("menuBox");

if(box.style.display==="none"){
box.style.display="block";

fetch("https://docs.google.com/spreadsheets/d/1qKc-2U5UGNKXbnvXYmBAlou36Uo9avtXe2Y36_PhRVY/gviz/tq?tqx=out:json&sheet=More%20Items")
.then(r=>r.text())
.then(d=>{
const j=JSON.parse(d.substr(47).slice(0,-2));

allItems=[];

j.table.rows.forEach(r=>{
let cat=r.c[2]?.v;
let sub=r.c[3]?.v;
let name=r.c[4]?.v;
let price=r.c[5]?.v;
let show=r.c[11]?.v;

if(name && (show==="Yes"||show==="yes")){
allItems.push({cat,sub,name:name+" ("+sub+")",price,base:name});
}
});

createFilters();
displayItems();
});
}else{
box.style.display="none";
}
}

/* FILTER */
function createFilters(){
let cats=["All",...new Set(allItems.map(i=>i.cat))];
document.getElementById("catBtns").innerHTML=
cats.map(c=>`<button onclick="filterCat('${c}')">${c}</button>`).join("");

let subs=["All",...new Set(allItems.map(i=>i.sub))];
document.getElementById("subBtns").innerHTML=
subs.map(s=>`<button onclick="filterSub('${s}')">${s}</button>`).join("");
}

function filterCat(c){currentCat=c;displayItems();}
function filterSub(s){currentSub=s;displayItems();}

/* DISPLAY WITH QTY */
function displayItems(){
let html="";
allItems.filter(i=>
(currentCat==="All"||i.cat===currentCat)&&
(currentSub==="All"||i.sub===currentSub)
).forEach(i=>{

let existing=cart.find(x=>x.base===i.base);

html+=`
<div class="menu-item">
<div class="menu-top">
<div>${i.name} ₹${i.price}</div>
</div>

<div class="qty-box">
<button class="qty-btn" onclick="updateItem('${i.base}',${i.price},-1)">-</button>
<span>${existing?existing.qty:0}</span>
<button class="qty-btn" onclick="updateItem('${i.base}',${i.price},1)">+</button>
</div>
</div>`;
});

document.getElementById("menuBox").innerHTML=html;
}

/* UPDATE ITEM */
function updateItem(base,price,val){
let item=cart.find(i=>i.base===base);

if(!item && val>0){
cart.push({name:base,base:base,price:price,qty:1});
}else if(item){
item.qty+=val;
if(item.qty<=0){
cart=cart.filter(i=>i.base!==base);
}
}

displayItems();
update();
}

/* CONFIRM */
function confirmOrder(){
let email=document.getElementById("email").value.trim();

if(!email || !email.includes("@") || email.includes(" ")){
alert("Enter Your Proper Email");
return;
}

let total=document.getElementById("total").innerText;

let items="";
cart.forEach(i=>items+=`${i.name} x${i.qty}<br>`);
if(half>0) items+=`Half Rice x${half}<br>`;
if(full>0) items+=`Full Rice x${full}<br>`;
if(plate>0) items+=`Plate x${plate}<br>`;

document.getElementById("summary").innerHTML=
`${items}<br><b>Total ₹${total}</b>`;

document.getElementById("popup").style.display="block";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* TEMP (FORMSPREE NEXT STEP) */
function sendOrder(){
alert("Next step: connect Formspree");
}
</script>

</body>
</html>
