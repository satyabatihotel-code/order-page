<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Order - Satyabati Hindu Hotel</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

.header {
  background: #5A5A5A;
  color: white;
  text-align: center;
  padding: 14px;
  font-size: 20px;
  font-weight: bold;
}

.container { padding: 15px; }

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.section {
  background: white;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
}

.qty-box {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.qty-btn {
  background: #5A5A5A;
  color: white;
  border: none;
  padding: 6px 12px;
}

.total-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  border-top: 1px solid #ccc;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.total {
  font-weight: bold;
  font-size: 22px; /* 🔥 bigger */
}

.btn {
  background: #FFC107;
  border: none;
  padding: 10px 15px;
  font-weight: bold;
  border-radius: 8px;
}

#popup {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
}

.popup-box {
  background:white;
  margin:20% auto;
  padding:15px;
  width:90%;
  max-width:350px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">Satyabati Hindu Hotel</div>

<div class="container">

<!-- Customer -->
<div class="section">
<input id="name" placeholder="Enter your Full Name">
<input id="phone" type="tel" placeholder="Enter Phone Number">
<input id="village" placeholder="Enter Village Name">
<input id="ps" placeholder="Enter Police Station">
</div>

<!-- Main Item -->
<div class="section">
<b id="itemName"></b>

<div class="qty-box">
  <div>Quantity</div>
  <div>
    <button class="qty-btn" onclick="changeQty(-1)">-</button>
    <span id="qty">1</span>
    <button class="qty-btn" onclick="changeQty(1)">+</button>
  </div>
</div>
</div>

<!-- Add-ons -->
<div class="section">
<b>Add-ons</b>

<div class="qty-box">
  <div>Extra Half Rice (₹6)</div>
  <div>
    <button class="qty-btn" onclick="half=Math.max(0,half-1);update()">-</button>
    <span id="halfQty">0</span>
    <button class="qty-btn" onclick="half++;update()">+</button>
  </div>
</div>

<div class="qty-box">
  <div>Extra Full Rice (₹11)</div>
  <div>
    <button class="qty-btn" onclick="full=Math.max(0,full-1);update()">-</button>
    <span id="fullQty">0</span>
    <button class="qty-btn" onclick="full++;update()">+</button>
  </div>
</div>

<div class="qty-box">
  <div>Disposable Plate (₹2)</div>
  <div>
    <button class="qty-btn" onclick="plate=Math.max(0,plate-1);update()">-</button>
    <span id="plateQty">0</span>
    <button class="qty-btn" onclick="plate++;update()">+</button>
  </div>
</div>

</div>

<!-- Add more items -->
<div class="section">
<div style="text-align:center; padding:10px; background:#eee; border-radius:8px; cursor:pointer;" onclick="toggleMenu()">
+ Add More Items
</div>

<div id="menuBox" style="display:none; margin-top:10px;"></div>
</div>

</div>

<!-- Total -->
<div class="total-bar">
<div class="total">₹ <span id="total">0</span></div>
<button class="btn" onclick="confirmOrder()">Proceed</button>
</div>

<!-- Popup -->
<div id="popup">
<div class="popup-box">
<h3>Confirm Order</h3>
<div id="summary"></div>
<br>
<button onclick="closePopup()">Edit</button>
<button onclick="sendWhatsApp()" style="background:#FFC107;border:none;">Confirm</button>
</div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const item = urlParams.get("item") || "Item";
const price = parseInt(urlParams.get("price")) || 0;

document.getElementById("itemName").innerText = item;

let cart = [{name:item, price:price, qty:1}];
let half=0, full=0, plate=0;

function changeQty(v){
  cart[0].qty = Math.max(1, cart[0].qty + v);
  document.getElementById("qty").innerText = cart[0].qty;
  update();
}

function update(){
  let total=0;

  cart.forEach(i => total += i.price*i.qty);
  total += half*6 + full*11 + plate*2;

  document.getElementById("halfQty").innerText = half;
  document.getElementById("fullQty").innerText = full;
  document.getElementById("plateQty").innerText = plate;
  document.getElementById("total").innerText = total;
}

update();

/* LOAD MENU */
function toggleMenu(){
  let box=document.getElementById("menuBox");

  if(box.style.display==="none"){
    box.style.display="block";

    fetch("https://docs.google.com/spreadsheets/d/1ha14_n8IdltiVwrMFYSC5e8l5fnMkJUQkxHqd1KzpcQ/gviz/tq?tqx=out:json")
    .then(res=>res.text())
    .then(data=>{
      const json=JSON.parse(data.substr(47).slice(0,-2));
      let rows=json.table.rows;

      let html="";
      rows.forEach(r=>{
        let name=r.c[4]?.v;
        let price=r.c[5]?.v;
        let show=r.c[11]?.v;

        if(name && (show==="Yes"||show==="yes"||show===true)){
          html+=`<div style="display:flex;justify-content:space-between;margin-top:8px;">
          <div>${name} (₹${price})</div>
          <button onclick="addItem('${name}',${price})">Add</button>
          </div>`;
        }
      });

      box.innerHTML=html;
    });
  } else {
    box.style.display="none";
  }
}

function addItem(name,price){
  let f=cart.find(i=>i.name===name);
  if(f){f.qty++} else {cart.push({name,price,qty:1})}
  alert(name+" added");
  update();
}

/* POPUP */
function confirmOrder(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let village=document.getElementById("village").value.trim();
let ps=document.getElementById("ps").value.trim();

if(!name||!phone||!village||!ps){alert("Fill all details");return;}
if(phone.length!=10){alert("Invalid phone");return;}

let total=document.getElementById("total").innerText;

window.data={name,phone,village,ps,total};

let items="";
cart.forEach(i=>{
  if(i.qty>0){ items+=`${i.name} (${i.qty})<br>`;}
});

if(half>0) items+=`Half Rice (${half})<br>`;
if(full>0) items+=`Full Rice (${full})<br>`;
if(plate>0) items+=`Plate (${plate})<br>`;

document.getElementById("summary").innerHTML=
`<b>${name}</b><br><br>${items}<br><b>Total ₹${total}</b>`;

document.getElementById("popup").style.display="block";
}

function closePopup(){ document.getElementById("popup").style.display="none"; }

function sendWhatsApp(){

let d=window.data;

let items="";
cart.forEach(i=>{
  if(i.qty>0){ items+=`- ${i.name} x${i.qty}\n`; }
});

if(half>0) items+=`- Half Rice x${half}\n`;
if(full>0) items+=`- Full Rice x${full}\n`;
if(plate>0) items+=`- Plate x${plate}\n`;

let msg=
`📍 Satyabati Hindu Hotel

👤 ${d.name}
📞 ${d.phone}
🏡 ${d.village}
🚓 ${d.ps}

🛒 Order:
${items}

💰 Total ₹${d.total}

👉 Please Pay ₹${d.total}
Send payment screenshot`;

window.open(`https://wa.me/919836697502?text=${encodeURIComponent(msg)}`);
closePopup();
}
</script>

</body>
</html>
