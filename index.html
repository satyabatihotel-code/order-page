<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family:Arial;margin:0;background:#fff;}

.header {
  background:#FFC107;
  color:#000;
  text-align:center;
  padding:16px;
  font-weight:bold;
}

.container {
  padding:15px;
  padding-bottom:220px; /* FIX: prevent hiding */
}

input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.section {
  background:#fff;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #eee;
}

.qty-box {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:10px;
}

.qty-btn {
  background:#5A5A5A;
  color:#fff;
  border:none;
  padding:6px 12px;
  border-radius:6px;
}

.add-more {
  text-align:center;
  padding:12px;
  background:#f2f2f2;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

/* bottom bar */
.total-bar {
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  border-top:1px solid #ccc;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.total {font-size:22px;font-weight:bold;}

.btn {
  background:#FFC107;
  border:none;
  padding:12px 20px;
  border-radius:10px;
  font-weight:bold;
  margin-right:60px;
}

/* popup */
#popup {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
}

.popup-box {
  background:#fff;
  margin:20% auto;
  padding:15px;
  width:90%;
  max-width:350px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">Satyabati Hindu Hotel</div>

<div class="container">

<!-- FORM -->
<div class="section">
<input id="name" placeholder="Enter your Full Name">
<input id="phone" type="tel" placeholder="Enter WhatsApp Number">
<input id="email" placeholder="Enter your Email">
<input id="village" placeholder="Enter Village Name">
<input id="ps" placeholder="Enter Police Station">
</div>

<!-- MAIN ITEM -->
<div class="section">
<b id="itemName"></b>

<div class="qty-box">
<div>Quantity</div>
<div>
<button class="qty-btn" onclick="changeQty(-1)">-</button>
<span id="qty">1</span>
<button class="qty-btn" onclick="changeQty(1)">+</button>
</div>
</div>
</div>

<!-- ADDONS -->
<div class="section">
<b>Add-ons</b>

<div class="qty-box">
<div>Half Rice ₹6</div>
<div>
<button class="qty-btn" onclick="half=Math.max(0,half-1);update()">-</button>
<span id="halfQty">0</span>
<button class="qty-btn" onclick="half++;update()">+</button>
</div>
</div>

<div class="qty-box">
<div>Full Rice ₹11</div>
<div>
<button class="qty-btn" onclick="full=Math.max(0,full-1);update()">-</button>
<span id="fullQty">0</span>
<button class="qty-btn" onclick="full++;update()">+</button>
</div>
</div>

<div class="qty-box">
<div>Plate ₹2</div>
<div>
<button class="qty-btn" onclick="plate=Math.max(0,plate-1);update()">-</button>
<span id="plateQty">0</span>
<button class="qty-btn" onclick="plate++;update()">+</button>
</div>
</div>
</div>

<!-- MORE ITEMS -->
<div class="section">
<div class="add-more" onclick="loadMore()">+ Add More Items</div>
<div id="menuBox"></div>
</div>

</div>

<!-- TOTAL -->
<div class="total-bar">
<div class="total">₹ <span id="total">0</span></div>
<button class="btn" onclick="confirmOrder()">Proceed</button>
</div>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h3>Confirm Order</h3>
<div id="summary"></div><br>
<button onclick="closePopup()">Edit</button>
<button style="background:#FFC107;border:none;" onclick="sendOrder()">Confirm</button>
</div>
</div>

<script>
const item = new URLSearchParams(location.search).get("item") || "Item";
const price = parseInt(new URLSearchParams(location.search).get("price")) || 0;

document.getElementById("itemName").innerText = item;

let cart=[{name:item,price:price,qty:1}];
let half=0,full=0,plate=0;

function changeQty(v){
cart[0].qty=Math.max(1,cart[0].qty+v);
document.getElementById("qty").innerText=cart[0].qty;
update();
}

function update(){
let total=0;
cart.forEach(i=>total+=i.price*i.qty);
total+=half*6+full*11+plate*2;
document.getElementById("total").innerText=total;

document.getElementById("halfQty").innerText=half;
document.getElementById("fullQty").innerText=full;
document.getElementById("plateQty").innerText=plate;
}
update();

/* LOAD ONLY SECOND SHEET */
function loadMore(){

fetch("https://docs.google.com/spreadsheets/d/1qKc-2U5UGNKXbnvXYmBAlou36Uo9avtXe2Y36_PhRVY/gviz/tq?tqx=out:json&sheet=More%20Items")
.then(r=>r.text())
.then(d=>{
const j=JSON.parse(d.substr(47).slice(0,-2));

let html="";

j.table.rows.forEach(r=>{
let sub=r.c[3]?.v;
let name=r.c[4]?.v;
let price=r.c[5]?.v;
let show=r.c[11]?.v;

if(name && (show==="Yes"||show==="yes")){

let key=name+" "+sub;

let found=cart.find(i=>i.key===key);

html+=`
<div class="section">
<div>${name} (${sub}) ₹${price}</div>

<div class="qty-box">
<button class="qty-btn" onclick="updateItem('${name}','${sub}',${price},-1)">-</button>
<span>${found?found.qty:0}</span>
<button class="qty-btn" onclick="updateItem('${name}','${sub}',${price},1)">+</button>
</div>
</div>`;
}
});

document.getElementById("menuBox").innerHTML=html;
});
}

/* UPDATE ITEM */
function updateItem(name,sub,price,val){

let key=name+" "+sub;

let item=cart.find(i=>i.key===key);

if(!item && val>0){
cart.push({key,name:name+" ("+sub+")",price,qty:1});
}else if(item){
item.qty+=val;
if(item.qty<=0){
cart=cart.filter(i=>i.key!==key);
}
}

loadMore();
update();
}

/* EMAIL VALIDATION */
function isValidEmail(email){
return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

/* CONFIRM */
function confirmOrder(){

let email=document.getElementById("email").value.trim();

if(!isValidEmail(email)){
alert("Enter Your Proper Email");
return;
}

let total=document.getElementById("total").innerText;

let items="";
cart.forEach(i=>items+=`${i.name} x${i.qty}<br>`);
if(half>0) items+=`Half Rice x${half}<br>`;
if(full>0) items+=`Full Rice x${full}<br>`;
if(plate>0) items+=`Plate x${plate}<br>`;

document.getElementById("summary").innerHTML=
`${items}<br><b>Total ₹${total}</b>`;

document.getElementById("popup").style.display="block";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function sendOrder(){
alert("Now connect Formspree");
}
</script>

</body>
</html>
