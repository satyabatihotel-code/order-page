<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family:Arial;margin:0;background:#f9f9f9;}

.header {
  background:#FFC107;
  text-align:center;
  padding:16px;
  font-weight:bold;
}

/* FIXED SPACING */
.container {
  padding:15px;
  padding-bottom:180px; /* reduced so button visible */
}

input {
  width:100%;padding:12px;margin:8px 0;
  border-radius:8px;border:1px solid #ccc;
}

.section {
  background:#fff;padding:15px;margin-top:12px;
  border-radius:12px;border:1px solid #eee;
}

.qty-box {
  display:flex;justify-content:space-between;
  align-items:center;margin-top:10px;
}

.qty-btn {
  background:#5A5A5A;color:#fff;
  border:none;width:35px;height:35px;
  border-radius:6px;
}

.item-count {margin:0 15px;font-weight:bold;}

/* ADD MORE BUTTON FIX */
.add-more {
  text-align:center;
  padding:15px;
  margin-top:20px;
  margin-bottom:20px;
  background:#fff;
  border:2px dashed #FFC107;
  border-radius:10px;
  font-weight:bold;
}

/* bottom bar */
.total-bar {
  position:fixed;
  bottom:0;width:100%;
  background:#fff;
  border-top:2px solid #FFC107;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.total {font-size:22px;font-weight:bold;}

.btn {
  background:#FFC107;
  border:none;
  padding:14px 30px;
  border-radius:10px;
  font-weight:bold;
  margin-right:80px; /* moved LEFT */
}

/* popup */
#popup {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
}

.popup-box {
  background:#fff;
  margin:15% auto;
  padding:20px;
  width:90%;
  max-width:360px;
  border-radius:12px;
}

.popup-btns {
  display:flex;
  gap:10px;
  margin-top:15px;
}

.popup-btns button {
  flex:1;
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  background:#FFC107;
}
</style>
</head>

<body>

<div class="header">Satyabati Hindu Hotel</div>

<div class="container">

<div class="section">
<input id="name" placeholder="Enter your Full Name">
<input id="phone" type="tel" placeholder="Enter WhatsApp Number">
<input id="village" placeholder="Enter Village Name">
<input id="ps" placeholder="Enter Police Station">
</div>

<div class="section">
<b id="itemName"></b>

<div class="qty-box">
<div>Quantity</div>
<div>
<button class="qty-btn" onclick="changeQty(-1)">-</button>
<span id="qty" class="item-count">1</span>
<button class="qty-btn" onclick="changeQty(1)">+</button>
</div>
</div>
</div>

<!-- ADDONS -->
<div class="section">
<b>Add-ons</b>

<div class="qty-box">
<div>Half Rice (₹6)</div>
<div>
<button class="qty-btn" onclick="half=Math.max(0,half-1);update()">-</button>
<span id="halfQty">0</span>
<button class="qty-btn" onclick="half++;update()">+</button>
</div>
</div>

<div class="qty-box">
<div>Full Rice (₹11)</div>
<div>
<button class="qty-btn" onclick="full=Math.max(0,full-1);update()">-</button>
<span id="fullQty">0</span>
<button class="qty-btn" onclick="full++;update()">+</button>
</div>
</div>

<div class="qty-box">
<div>Plate (₹2)</div>
<div>
<button class="qty-btn" onclick="plate=Math.max(0,plate-1);update()">-</button>
<span id="plateQty">0</span>
<button class="qty-btn" onclick="plate++;update()">+</button>
</div>
</div>

</div>

<!-- MORE ITEMS -->
<div id="menuBox"></div>
<div class="add-more" onclick="loadMore()" id="loadBtn">+ Add More Items</div>

</div>

<!-- BOTTOM -->
<div class="total-bar">
<div class="total">₹ <span id="total">0</span></div>
<button class="btn" onclick="confirmOrder()">Proceed</button>
</div>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h3>Confirm Order</h3>
<div id="summary"></div>

<div class="popup-btns">
<button onclick="closePopup()">Edit</button>
<button onclick="sendOrder()">Confirm</button>
</div>
</div>
</div>

<script>
const item = new URLSearchParams(location.search).get("item") || "Item";
const price = parseInt(new URLSearchParams(location.search).get("price")) || 0;

document.getElementById("itemName").innerText = item;

let cart={main:{name:item,price:price,qty:1},more:{}};
let half=0,full=0,plate=0;
let moreData=[],loaded=false;

/* MAIN QTY */
function changeQty(v){
cart.main.qty=Math.max(1,cart.main.qty+v);
document.getElementById("qty").innerText=cart.main.qty;
update();
}

/* TOTAL */
function update(){
let total=cart.main.price*cart.main.qty;

Object.values(cart.more).forEach(i=>total+=i.price*i.qty);

total+=half*6+full*11+plate*2;

document.getElementById("total").innerText=total;
document.getElementById("halfQty").innerText=half;
document.getElementById("fullQty").innerText=full;
document.getElementById("plateQty").innerText=plate;
}
update();

/* LOAD ONLY PRODUCT NAME (NO SUBCATEGORY) */
function loadMore(){
if(loaded) return;

fetch("https://docs.google.com/spreadsheets/d/1qKc-2U5UGNKXbnvXYmBAlou36Uo9avtXe2Y36_PhRVY/gviz/tq?tqx=out:json&sheet=More%20Items")
.then(r=>r.text())
.then(d=>{
const j=JSON.parse(d.substr(47).slice(0,-2));

j.table.rows.forEach(r=>{
let name=r.c[4]?.v||"";
let price=r.c[5]?.v||0;
let show=r.c[11]?.v||"";

if(name && show.toLowerCase()==="yes"){
moreData.push({id:name,name:name,price:price});
}
});

renderMore();
loaded=true;
document.getElementById("loadBtn").style.display="none";
});
}

/* RENDER */
function renderMore(){
let html="";
moreData.forEach(i=>{
let q=cart.more[i.id]?.qty||0;

html+=`
<div class="section">
<div>${i.name} ₹${i.price}</div>
<div class="qty-box">
<button class="qty-btn" onclick="updateMore('${i.id}',-1)">-</button>
<span class="item-count">${q}</span>
<button class="qty-btn" onclick="updateMore('${i.id}',1)">+</button>
</div>
</div>`;
});
document.getElementById("menuBox").innerHTML=html;
}

/* UPDATE MORE */
function updateMore(id,val){
let item=moreData.find(x=>x.id===id);

if(!cart.more[id] && val>0){
cart.more[id]={name:item.name,price:item.price,qty:1};
}else if(cart.more[id]){
cart.more[id].qty+=val;
if(cart.more[id].qty<=0) delete cart.more[id];
}

renderMore();
update();
}

/* CONFIRM */
function confirmOrder(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let village=document.getElementById("village").value.trim();
let ps=document.getElementById("ps").value.trim();

if(!name||!phone||!village||!ps){alert("Fill all details");return;}

let items=`${cart.main.name}*${cart.main.qty}`;

Object.values(cart.more).forEach(i=>{
items+=`, ${i.name}*${i.qty}`;
});

if(half>0) items+=`, Half Rice*${half}`;
if(full>0) items+=`, Full Rice*${full}`;
if(plate>0) items+=`, Plate*${plate}`;

let total=document.getElementById("total").innerText;

document.getElementById("summary").innerHTML=
`${name}<br>${items}<br><b>Total ₹${total}</b>`;

document.getElementById("popup").style.display="block";
}

/* SEND WHATSAPP WITH QR */
function sendOrder(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let village=document.getElementById("village").value;
let ps=document.getElementById("ps").value;
let total=document.getElementById("total").innerText;

let items=`${cart.main.name}*${cart.main.qty}`;

Object.values(cart.more).forEach(i=>{
items+=`, ${i.name}*${i.qty}`;
});

if(half>0) items+=`, Half Rice*${half}`;
if(full>0) items+=`, Full Rice*${full}`;
if(plate>0) items+=`, Plate*${plate}`;

let msg=
`New Order

${name}
Phone - ${phone}
Village - ${village}
P.S - ${ps}

Order - ${items}

Total - ₹${total}

Pay Here:
https://res.cloudinary.com/dh6npc54z/image/upload/f_auto,q_auto/WhatsApp_Image_2026-04-22_at_8.26.01_PM_moxqfr

Send Payment Screenshot For Confirmation

Thank You`;

window.open(`https://wa.me/919836697502?text=${encodeURIComponent(msg)}`);
}

function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
