<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family:Arial;margin:0;background:#f9f9f9;}

.header {
  position:fixed;top:0;width:100%;
  background:#FFC107;text-align:center;
  padding:12px;font-weight:bold;z-index:1000;
}

.container {padding:10px;padding-top:55px;padding-bottom:160px;}

input {
  width:100%;padding:10px;margin:4px 0;
  border-radius:6px;border:1px solid #ccc;
}

.section {
  background:#fff;padding:10px;margin-top:6px;
  border-radius:10px;border:1px solid #eee;
}

.qty-box {
  display:flex;justify-content:space-between;
  align-items:center;margin-top:6px;
}

.qty-btn {
  background:#5A5A5A;color:#fff;
  border:none;width:30px;height:30px;border-radius:6px;
}

.count {margin:0 10px;font-weight:bold;}

.add-more {
  text-align:center;padding:12px;
  background:#fff;border:2px dashed #FFC107;
  border-radius:10px;margin-top:10px;cursor:pointer;
}

.total-bar {
  position:fixed;bottom:0;width:100%;
  background:#fff;border-top:2px solid #FFC107;
  padding:10px;display:flex;justify-content:space-between;
  align-items:center;
}

.total {font-size:20px;font-weight:bold;}
.btn {background:#FFC107;border:none;padding:10px 20px;border-radius:8px;}

#menuBox {display:none;}
</style>
</head>

<body>

<div class="header">Satyabati Hindu Hotel</div>

<div class="container">

<div class="section">
<input id="name" placeholder="Enter your Full Name">
<input id="phone" placeholder="Enter WhatsApp Number">
<input id="village" placeholder="Enter Village Name">
<input id="ps" placeholder="Enter Police Station">
</div>

<div class="section">
<b id="itemName"></b>

<div class="qty-box">
<div>Quantity</div>
<div>
<button class="qty-btn" onclick="changeQty(-1)">-</button>
<span id="qty" class="count">1</span>
<button class="qty-btn" onclick="changeQty(1)">+</button>
</div>
</div>
</div>

<div class="section">
<b>Add-ons</b>

<div class="qty-box">
<div>Half Rice (₹6)</div>
<div>
<button class="qty-btn" onclick="half=Math.max(0,half-1);update()">-</button>
<span id="halfQty" class="count">0</span>
<button class="qty-btn" onclick="half++;update()">+</button>
</div>
</div>

<div class="qty-box">
<div>Full Rice (₹11)</div>
<div>
<button class="qty-btn" onclick="full=Math.max(0,full-1);update()">-</button>
<span id="fullQty" class="count">0</span>
<button class="qty-btn" onclick="full++;update()">+</button>
</div>
</div>

</div>

<div class="add-more" onclick="toggleMenu()">+ Add More Items</div>
<div id="menuBox"></div>

</div>

<div class="total-bar">
<div class="total">₹ <span id="total">0</span></div>
<button class="btn">Proceed</button>
</div>

<script>
const item = "Meal";
const price = 50;

document.getElementById("itemName").innerText = item;

let qty=1,half=0,full=0;
let moreItems={};
let menuLoaded=false;

function changeQty(v){
qty=Math.max(1,qty+v);
document.getElementById("qty").innerText=qty;
update();
}

function update(){
let total = (price*qty)+(half*6)+(full*11);

Object.values(moreItems).forEach(i=>{
  total += i.price*i.qty;
});

document.getElementById("total").innerText=total;
document.getElementById("halfQty").innerText=half;
document.getElementById("fullQty").innerText=full;
}

function toggleMenu(){
let box=document.getElementById("menuBox");

if(box.style.display==="none"){
  box.style.display="block";

  if(!menuLoaded){
    fetch("https://docs.google.com/spreadsheets/d/1qKc-2U5UGNKXbnvXYmBAlou36Uo9avtXe2Y36_PhRVY/gviz/tq?tqx=out:json&sheet=More%20Items")
    .then(r=>r.text())
    .then(d=>{
      const j=JSON.parse(d.substr(47).slice(0,-2));
      let html="";

      j.table.rows.forEach(r=>{
        let name=r.c[4]?.v;
        let price=r.c[5]?.v;
        let show=r.c[11]?.v;

        if(name && (show==="Yes"||show==="yes")){
          html+=`
          <div class="section">
            <b>${name} ₹${price}</b>
            <div class="qty-box">
              <div>Quantity</div>
              <div>
                <button class="qty-btn" onclick="updateMore('${name}',${price},-1)">-</button>
                <span class="count" id="m_${name}">0</span>
                <button class="qty-btn" onclick="updateMore('${name}',${price},1)">+</button>
              </div>
            </div>
          </div>`;
        }
      });

      box.innerHTML=html;
      menuLoaded=true;
    });
  }

}else{
  box.style.display="none";
}
}

function updateMore(name,price,val){

if(!moreItems[name] && val>0){
  moreItems[name]={price:price,qty:1};
}else if(moreItems[name]){
  moreItems[name].qty+=val;
  if(moreItems[name].qty<=0) delete moreItems[name];
}

document.getElementById("m_"+name).innerText = moreItems[name]?.qty || 0;

update();
}

update();
</script>

</body>
</html>
