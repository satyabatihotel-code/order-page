<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family:Arial;text-align:center;padding:30px;background:#f9f9f9;}
.box {
  background:#fff;
  padding:20px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="box">
<h2>✅ Payment Successful</h2>

<p id="orderId"></p>
<p id="total"></p>

<p>We will contact you shortly</p>
</div>

<script>
let total=new URLSearchParams(location.search).get("total");

let id="ORD"+Math.floor(Math.random()*100000);

document.getElementById("orderId").innerText="Order ID: "+id;
document.getElementById("total").innerText="Paid: ₹"+total;
</script>

</body>
</html>
